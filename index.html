function showToast(message, duration) {
    duration = duration || 2000;
    var existing = document.getElementById('custom-toast');
    if (existing) existing.remove();
    
    var toast = document.createElement('div');
    toast.id = 'custom-toast';
    toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:24px;font-size:14px;z-index:10000;max-width:80%;text-align:center;';
    toast.textContent = message;
    document.body.appendChild(toast);
    
    setTimeout(function() {
        toast.style.opacity = '0';
        setTimeout(function() { toast.remove(); }, 300);
    }, duration);
}

function closeFullscreenPage() {
    var el = document.getElementById('fullscreen-container');
    if (el) el.classList.remove('active');
}

function openFullscreenPage(module) {
    closeUserMenu();
    var container = document.getElementById('fullscreen-container');
    var titleEl = document.getElementById('fullscreen-title');
    var contentEl = document.getElementById('fullscreen-content');
    if (!container || !titleEl || !contentEl) return;
    
    var moduleTitles = {
        'training': '🧠 认知训练',
        'attention': '👁️ 注意力训练',
        'memory': '📝 记忆力训练',
        'thinking': '🧩 思维训练',
        'focus': '🎯 专注力训练',
        'reaction': '⚡ 反应力训练',
        'mindmap': '🌳 思维导图',
        'library': '📚 学习图书馆',
        'journal': '📓 学习日记',
        'video': '📺 视频课程',
        'growth': '📈 成长记录',
        'my': '👤 个人中心',
        'games': '🎮 训练游戏',
        'map': '🧠 认知地图',
        'deepseek': '🤖 DeepSeek',
        'practice': '🎯 AI精准练',
        'plan': '📅 学习计划',
        'topics': '📚 母题训练',
        'method': '💡 学霸方法',
        'podcast': '🎧 播客课堂',
        'wrongbook': '📒 错题本',
        'pomodoro': '🍅 番茄闹钟',
        'settings': '⚙️ 设置'
    };
    
    titleEl.textContent = moduleTitles[module] || '模块';
    lazyLoadModule(module, contentEl);
    container.classList.add('active');
}

function lazyLoadModule(module, contentEl) {
    contentEl.innerHTML = '<div style="text-align:center;padding:40px;"><div style="font-size:40px;">⏳</div><div style="margin-top:10px;color:#666;">加载中...</div></div>';
    
    setTimeout(function() {
        switch(module) {
            case 'practice': if(typeof renderPractice === 'function') renderPractice(contentEl); break;
            case 'map': if(typeof renderMap === 'function') renderMap(contentEl); break;
            case 'plan': if(typeof renderPlan === 'function') renderPlan(contentEl); break;
            case 'topics': if(typeof renderTopics === 'function') renderTopics(contentEl); break;
            case 'method': if(typeof renderMethod === 'function') renderMethod(contentEl); break;
            case 'thinking': if(typeof renderThinking === 'function') renderThinking(contentEl); break;
            case 'podcast': if(typeof renderPodcast === 'function') renderPodcast(contentEl); break;
            case 'video': if(typeof renderVideo === 'function') renderVideo(contentEl); break;
            case 'games': if(typeof renderGames === 'function') renderGames(contentEl); break;
            case 'deepseek': if(typeof renderDeepseek === 'function') renderDeepseek(contentEl); break;
            case 'wrongbook': if(typeof renderWrongbook === 'function') renderWrongbook(contentEl); break;
            case 'pomodoro': if(typeof renderPomodoro === 'function') renderPomodoro(contentEl); break;
            case 'my': if(typeof renderMyPage === 'function') renderMyPage(contentEl); break;
            case 'journal': if(typeof renderJournalModule === 'function') renderJournalModule(contentEl); else renderJournalPage(contentEl); break;
            case 'library': if(typeof renderLibraryModule === 'function') renderLibraryModule(contentEl); else renderLibraryPage(contentEl); break;
            case 'growth': if(typeof renderGrowthModule === 'function') renderGrowthModule(contentEl); break;
            case 'mindmap': if(typeof renderMindmapModule === 'function') renderMindmapModule(contentEl); break;
            default: contentEl.innerHTML = '<div class="card"><p>模块开发中...</p></div>';
        }
    }, 100);
}

function navigateTo(page) {
    var pages = document.querySelectorAll('.page');
    for(var i=0;i<pages.length;i++) pages[i].classList.remove('active');
    var target = document.getElementById('page-' + page);
    if (target) target.classList.add('active');
}

function showPage(page) { navigateTo(page); }

function closeUserMenu() {
    var dropdown = document.getElementById('user-dropdown');
    if (dropdown) dropdown.classList.remove('show');
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    for(var i=0;i<regs.length;i++){
      if(regs[i].active && regs[i].active.scriptURL.indexOf('v143')>-1){
        regs[i].unregister();
        console.log('[V255] 已注销旧SW');
      }
    }
  });
  caches.keys().then(function(names){
    for(var i=0;i<names.length;i++){
      if(names[i].indexOf('v143')>-1 || names[i].indexOf('v144')>-1 || names[i].indexOf('v145')>-1){
        caches.delete(names[i]);
        console.log('[V255] 已删除旧缓存:',names[i]);
      }
    }
  });
}
</script>

<script>
(function() {
    // 加载顺序必须与ui.js中的loadOrder一致
    // 自动版本号：基于时间戳，每次部署自动更新
    window.__APP_VERSION = Date.now();
    
    const loadOrder = ['js/config.js', 'js/ctm.js', 'js/audio.js', 'js/db.js', 'js/storage.js', 'js/utils.js', 'js/user.js', 'js/data/week-plans.js', 'js/data/topics.js', 'js/data/podcasts.js', 'js/data/videos.js', 'js/data/games-config.js', 'js/data/ability-model.js', 'js/modules/practice.js', 'js/modules/map.js', 'js/modules/plan.js', 'js/modules/topics.js', 'js/modules/method.js', 'js/modules/thinking.js', 'js/modules/podcast.js', 'js/modules/video.js', 'js/modules/player.js', 'js/modules/games.js', 'js/modules/ai.js', 'js/modules/deepseek.js', 'js/modules/wrongbook.js', 'js/modules/pomodoro.js', 'js/modules/radar-chart.js', 'js/modules/growth-chart.js', 'js/modules/local-db.js', 'js/modules/self-drive.js', 'js/modules/my-page.js', 'js/modules/journal.js', 'js/modules/library.js', 'js/modules/v255-modules.js', 'js/modules/ui.js'];
    // 并行加载所有JS文件，大幅提升页面加载速度
    const v = window.__APP_VERSION || Date.now();
    let pending = loadOrder.length;
    function onScriptLoaded() {
        pending--;
        if (pending <= 0) {
            if (typeof initPortal === 'function') initPortal();
            setTimeout(function() {
                if (typeof initEnhancedVideoPlayer === 'function' && window.videoCtx && !window.videoCtx.isInitialized) {
                    initEnhancedVideoPlayer();
                }
            }, 50);
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(function(err) {});
            }
        }
    }
    loadOrder.forEach(function(src) {
        const script = document.createElement('script');
        script.src = src + '?v=' + v;
        script.onload = onScriptLoaded;
        script.onerror = function() { console.warn('Failed to load:', src); onScriptLoaded(); };
        document.head.appendChild(script);
    });
})();
</script>

      <button onclick="cancelPrediction()" style="flex:1;padding:12px;background:#f5f5f5;color:#666;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;">跳过</button>
      <button onclick="confirmPrediction()" style="flex:1;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;">开始挑战</button>
    </div>
  </div>
</div>
<style>#metacognitive-modal.show{display:flex!important;}@keyframes slideIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}</style>
<div id="game-fullscreen-container" style="position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(180deg,#1a1a2e,#16213e);z-index:5000;display:none;flex-direction:column;overflow:hidden;">
    <div id="game-header" style="display:flex;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#667eea,#764ba2);">
        <div onclick="exitGame()" style="color:white;font-size:24px;cursor:pointer;padding:8px;">←</div>
        <div id="game-title" style="flex:1;font-size:16px;font-weight:600;color:white;text-align:center;">游戏</div>
        <div id="game-level-badge" style="background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:12px;font-size:12px;color:white;margin-right:8px;">关卡 1</div>
    </div>
    <div style="padding:12px;background:rgba(0,0,0,0.2);display:flex;justify-content:space-around;">
        <div style="text-align:center;"><div style="color:rgba(255,255,255,0.7);font-size:10px;">得分</div><div id="game-score" style="color:white;font-size:20px;font-weight:bold;">0</div></div>
        <div style="text-align:center;"><div style="color:rgba(255,255,255,0.7);font-size:10px;">最高分</div><div id="game-best-score" style="color:#FFD700;font-size:20px;font-weight:bold;">0</div></div>
        <div style="text-align:center;"><div style="color:rgba(255,255,255,0.7);font-size:10px;">用时</div><div id="game-timer" style="color:white;font-size:20px;font-weight:bold;">0s</div></div>
    </div>
    <div id="game-fullscreen" style="flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;"></div>
    <div id="game-board" style="flex:1;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden;min-height:0;max-height:calc(100vh - 200px);"></div>
    <div style="padding:10px 16px;background:rgba(0,0,0,0.3);display:flex;gap:10px;flex-shrink:0;position:sticky;bottom:0;">
        <button onclick="exitGame()" style="flex:1;padding:14px;background:rgba(255,255,255,0.1);border:none;border-radius:12px;color:white;font-size:14px;cursor:pointer;">退出</button>
        <button onclick="resetGame()" style="flex:1;padding:14px;background:#667eea;border:none;border-radius:12px;color:white;font-size:14px;cursor:pointer;">重新开始</button>
    </div>
</div>
</body>
</html>
