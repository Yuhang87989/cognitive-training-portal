<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认知训练门户 - ES6 Modules</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px 10px 80px 10px;
        }
        .welcome { color: white; padding: 20px; text-align: center; }
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
        }
        .module-card {
            background: rgba(255,255,255,0.95);
            padding: 20px 10px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .module-card:hover { transform: translateY(-4px); }
        .module-icon { font-size: 32px; margin-bottom: 8px; }
        .module-name { font-size: 14px; font-weight: 600; color: #333; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        }
        .nav-item {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
        }
        .nav-icon { font-size: 20px; }
        .nav-label { font-size: 12px; color: #666; }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 10000;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hidden { display: none !important; }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
        }
        .status-working { background: #4caf50; color: white; }
        .status-progress { background: #ff9800; color: white; }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: #666;">正在加载...</p>
    </div>

    <div class="welcome">
        <h1>👋 欢迎使用</h1>
        <p>ES6 Modules 版本 V256 <span class="status-badge status-working">部署成功</span></p>
    </div>
    <div id="app-container" class="modules-grid"></div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.showToast('首页')">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">首页</div>
        </div>
        <div class="nav-item" onclick="window.showToast('功能开发中')">
            <div class="nav-icon">🎯</div>
            <div class="nav-label">训练</div>
        </div>
        <div class="nav-item" onclick="window.showToast('功能开发中')">
            <div class="nav-icon">🤖</div>
            <div class="nav-label">AI</div>
        </div>
    </div>

    <script>
        // 全局工具函数
        window.showToast = function(msg, duration = 2000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        };

        // 12个模块定义
        const modules = [
            { id: 'selfdrive', name: '自驱力训练', icon: '🚀', status: 'working' },
            { id: 'deepseek', name: 'DeepSeek', icon: '🔍', status: 'working' },
            { id: 'wrongbook', name: '错题本', icon: '📚', status: 'working' },
            { id: 'pomodoro', name: '番茄钟', icon: '⏰', status: 'working' },
            { id: 'method', name: '学霸方法', icon: '📝', status: 'working' },
            { id: 'thinking', name: '思维训练', icon: '🧠', status: 'working' },
            { id: 'memory', name: '记忆训练', icon: '💾', status: 'progress' },
            { id: 'focus', name: '专注力', icon: '🎯', status: 'progress' },
            { id: 'habit', name: '习惯养成', icon: '✨', status: 'progress' },
            { id: 'goal', name: '目标管理', icon: '🎯', status: 'progress' },
            { id: 'review', name: '复盘总结', icon: '📋', status: 'progress' },
            { id: 'settings', name: '系统设置', icon: '⚙️', status: 'progress' },
        ];

        // 渲染首页
        function renderHomePage() {
            const container = document.getElementById('app-container');
            container.innerHTML = modules.map(m => `
                <div class="module-card" onclick="window.openModule('${m.id}')">
                    <div class="module-icon">${m.icon}</div>
                    <div class="module-name">${m.name}</div>
                </div>
            `).join('');
        }

        // 打开模块
        window.openModule = function(moduleId) {
            window.showToast('打开模块: ' + moduleId + ' (开发中)');
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderHomePage();
            document.getElementById('loading').classList.add('hidden');
            window.showToast('ES6 Modules 版本加载成功！');
        });
    </script>
</body>
</html>
