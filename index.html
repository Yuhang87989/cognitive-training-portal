<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认知训练门户 - ES6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px; margin-bottom: 30px; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .module-card { background: white; border-radius: 16px; padding: 24px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .module-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        .module-icon { font-size: 48px; margin-bottom: 12px; }
        .module-card h3 { font-size: 18px; margin-bottom: 8px; color: #333; }
        .module-card p { font-size: 14px; color: #666; line-height: 1.5; }
        .back-btn { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        .back-btn:hover { background: #5a6fd6; }
        .module-content { background: white; border-radius: 16px; padding: 30px; min-height: 500px; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>🧠 认知训练门户</h1>
            <p>ES6 Modules 模块化架构版本</p>
        </div>
        <div class="modules-grid" id="modulesGrid"></div>
    </div>

    <script type="module">
        // 核心模块导入
        import { showToast } from './src/utils.js';
        import { renderDeepSeek } from './src/ui.js';
        import { default as deepseekModule } from './src/modules/deepseek.js';
        import { default as libraryModule } from './src/modules/library.js';
        import { default as selfDriveModule } from './src/modules/self-drive.js';
        import { default as pomodoroModule } from './src/modules/pomodoro.js';

        // 模块列表
        const MODULES = [
            { id: 'deepseek', name: 'AI 助手', icon: '🤖', color: '#4facfe', desc: 'DeepSeek 智能对话' },
            { id: 'library', name: '学习图书馆', icon: '📚', color: '#a855f7', desc: '书籍、文章、视频资源' },
            { id: 'selfdrive', name: '自驱力', icon: '💪', color: '#fed6e3', desc: '目标、习惯、打卡' },
            { id: 'pomodoro', name: '番茄专注', icon: '🍅', color: '#ff6b6b', desc: '25分钟专注计时' },
        ];

        let currentModule = null;

        // 渲染首页
        function renderHome() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="header">
                    <h1>🧠 认知训练门户</h1>
                    <p>ES6 Modules 模块化架构版本</p>
                </div>
                <div class="modules-grid" id="modulesGrid"></div>
            `;

            const grid = document.getElementById('modulesGrid');
            grid.innerHTML = MODULES.map(m => `
                <div class="module-card" data-id="${m.id}">
                    <div class="module-icon">${m.icon}</div>
                    <h3>${m.name}</h3>
                    <p>${m.desc}</p>
                </div>
            `).join('');

            grid.querySelectorAll('.module-card').forEach(card => {
                card.addEventListener('click', () => openModule(card.dataset.id));
            });
        }

        // 打开模块
        function openModule(moduleId) {
            const module = MODULES.find(m => m.id === moduleId);
            if (!module) {
                showToast('模块开发中...');
                return;
            }

            currentModule = moduleId;
            const app = document.getElementById('app');
            app.innerHTML = `
                <button class="back-btn" onclick="window.goHome()">← 返回首页</button>
                <div class="module-content" id="moduleContent">
                    <h2>${module.icon} ${module.name}</h2>
                    <p style="margin-top: 20px; color: #666;">正在加载模块内容...</p>
                </div>
            `;

            // 渲染对应模块
            const content = document.getElementById('moduleContent');
            try {
                if (moduleId === 'deepseek') {
                    deepseekModule.init();
                    renderDeepSeek(content);
                } else if (moduleId === 'pomodoro') {
                    pomodoroModule.init();
                    renderPomodoro(content);
                } else if (moduleId === 'selfdrive') {
                    selfDriveModule.init();
                    showToast('自驱力模块已加载');
                } else if (moduleId === 'library') {
                    libraryModule.init();
                    showToast('学习图书馆已加载');
                }
            } catch (e) {
                console.error(e);
                showToast('模块加载中: ' + module.name);
            }
        }

        // 番茄钟简单渲染
        function renderPomodoro(container) {
            container.innerHTML = `
                <h3>🍅 番茄专注</h3>
                <div style="text-align: center; padding: 40px;">
                    <div style="font-size: 72px; font-weight: bold; color: #667eea; margin-bottom: 20px;">25:00</div>
                    <button onclick="alert('番茄钟开始！')" style="background: #ff6b6b; color: white; border: none; padding: 16px 40px; border-radius: 12px; font-size: 18px; cursor: pointer;">开始专注</button>
                </div>
            `;
        }

        window.goHome = renderHome;

        // 初始化
        renderHome();
        console.log('✅ ES6 应用已启动');
    </script>
</body>
</html>
