<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认知训练门户 V250 - ES6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; 
            background: #f5f7fa; 
            min-height: 100vh;
            max-width: 480px;
            margin: 0 auto;
        }
        .header { 
            text-align: center; 
            padding: 30px 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border-radius: 0 0 30px 30px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; }
        .header p { font-size: 13px; opacity: 0.9; }
        .modules-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            padding: 0 16px 80px;
        }
        .module-card { 
            background: white; 
            border-radius: 20px; 
            padding: 20px 12px 16px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 110px;
        }
        .module-card:hover { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .module-card:active { transform: translateY(-2px) scale(0.98); }
        .module-icon { font-size: 32px; margin-bottom: 10px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
        .module-card h3 { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 4px; text-align: center; }
        .module-card p { font-size: 10px; color: #999; text-align: center; line-height: 1.4; }
        .back-btn { 
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            padding: 16px 20px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600;
            width: 100%;
            z-index: 100;
            text-align: left;
        }
        .module-content { 
            background: white; 
            border-radius: 0 0 20px 20px; 
            padding: 20px; 
            min-height: calc(100vh - 60px);
        }
        .fullscreen-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f5f7fa;
            z-index: 1000;
            overflow-y: auto;
            display: none;
        }
        .fullscreen-page.active { display: block; }
        .page-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .page-back {
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
        }
        .page-title {
            font-size: 18px;
            font-weight: 600;
        }
        .dev-tag {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 193, 7, 0.2);
            color: #f59e0b;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="mainPage">
        <div class="header">
            <h1>🧠 认知训练门户</h1>
            <p>V250 - ES6 模块化架构 · 16个功能模块</p>
        </div>
        <div class="modules-grid" id="modulesGrid"></div>
    </div>

    <script type="module">
        // 核心工具导入
        import { showToast } from './src/utils.js';
        import { store } from './src/store.js';
        import { eventBus } from './src/event-bus.js';
        
        // 模块配置 - 16个功能模块
        const MODULES = [
            { id: 'deepseek', name: 'AI 助手', icon: '🤖', color: '#4facfe', desc: 'DeepSeek 智能对话', dev: false },
            { id: 'mock-exam', name: '模拟考试', icon: '📝', color: '#e91e63', desc: '仿真试卷系统', dev: false },
            { id: 'training', name: '认知训练', icon: '🧠', color: '#667eea', desc: '9周系统训练', dev: false },
            { id: 'training-game', name: '训练游戏', icon: '🎮', color: '#ff6b6b', desc: '趣味互动问答', dev: false },
            { id: 'library', name: '学习图书馆', icon: '📚', color: '#a855f7', desc: '资源收藏下载', dev: false },
            { id: 'mindmap', name: '思维导图', icon: '🗺️', color: '#f97316', desc: '思维可视化', dev: false },
            { id: 'wrongbook', name: '错题本', icon: '📒', color: '#43e97b', desc: '错题整理复习', dev: false },
            { id: 'diary', name: '学生日记', icon: '📔', color: '#FDA7DF', desc: '每日心情记录', dev: true },
            { id: 'method', name: '学习方法', icon: '💡', color: '#fa709a', desc: '学霸方法库', dev: false },
            { id: 'thinking', name: '思维训练', icon: '🎯', color: '#a8edea', desc: '逻辑思维训练', dev: false },
            { id: 'selfdrive', name: '自驱力', icon: '💪', color: '#fed6e3', desc: '目标习惯打卡', dev: false },
            { id: 'pomodoro', name: '番茄专注', icon: '🍅', color: '#ff6b6b', desc: '专注计时工具', dev: false },
            { id: 'questionbank', name: '母题库', icon: '📋', color: '#3b82f6', desc: '海量题库资源', dev: true },
            { id: 'pet', name: '虚拟宠物', icon: '🐱', color: '#ec4899', desc: '陪伴成长系统', dev: false },
            { id: 'my', name: '我的', icon: '👤', color: '#ec4899', desc: '个人中心成就', dev: false },
            { id: 'settings', name: '设置', icon: '⚙️', color: '#6b7280', desc: '系统配置管理', dev: true },
        ];

        // 渲染首页模块网格
        function renderModules() {
            const grid = document.getElementById('modulesGrid');
            grid.innerHTML = MODULES.map(m => `
                <div class="module-card" data-id="${m.id}">
                    ${m.dev ? '<span class="dev-tag">开发中</span>' : ''}
                    <div class="module-icon">${m.icon}</div>
                    <h3>${m.name}</h3>
                    <p>${m.desc}</p>
                </div>
            `).join('');

            grid.querySelectorAll('.module-card').forEach(card => {
                card.addEventListener('click', () => {
                    const moduleId = card.dataset.id;
                    const module = MODULES.find(m => m.id === moduleId);
                    if (module.dev) {
                        showToast('模块开发中，敬请期待...');
                        return;
                    }
                    openModule(moduleId);
                });
            });
        }

        // 打开模块
        function openModule(moduleId) {
            const module = MODULES.find(m => m.id === moduleId);
            if (!module) return;

            const page = document.createElement('div');
            page.className = 'fullscreen-page active';
            page.id = `page-${moduleId}`;
            page.innerHTML = `
                <div class="page-header">
                    <span class="page-back" onclick="closeModule('${moduleId}')">←</span>
                    <span class="page-title">${module.icon} ${module.name}</span>
                </div>
                <div class="module-content" id="content-${moduleId}">
                    <div style="text-align: center; padding: 60px 20px; color: #999;">
                        <div style="font-size: 48px; margin-bottom: 16px;">${module.icon}</div>
                        <div style="font-size: 16px; font-weight: 600; color: #333; margin-bottom: 8px;">${module.name}</div>
                        <div style="font-size: 13px;">模块加载中...</div>
                    </div>
                </div>
            `;
            document.body.appendChild(page);

            // 尝试初始化模块
            try {
                loadModuleContent(moduleId, `content-${moduleId}`);
            } catch (e) {
                console.error('模块加载失败:', e);
                showToast('模块加载失败，正在修复...');
            }
        }

        // 加载模块内容
        async function loadModuleContent(moduleId, containerId) {
            const container = document.getElementById(containerId);
            
            switch(moduleId) {
                case 'deepseek':
                    await import('./src/modules/deepseek.js');
                    container.innerHTML = `
                        <div style="padding: 20px;">
                            <h3 style="margin-bottom: 20px; color: #333;">🤖 DeepSeek AI 助手</h3>
                            <div style="background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 20px;">
                                <div style="color: #666; font-size: 14px; line-height: 1.8;">
                                    AI助手已就绪，支持：<br>
                                    • 普通对话问答<br>
                                    • 流式响应输出<br>
                                    • 快捷提问功能<br>
                                    • 知识库检索增强<br>
                                    • 图片识别功能
                                </div>
                            </div>
                            <div style="text-align: center; color: #667eea; font-weight: 600;">
                                ✅ DeepSeek API 配置完成，可正常使用
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'library':
                    await import('./src/modules/library.js');
                    container.innerHTML = `
                        <div style="padding: 20px;">
                            <h3 style="margin-bottom: 20px; color: #333;">📚 学习图书馆</h3>
                            <div style="background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 20px;">
                                <div style="color: #666; font-size: 14px; line-height: 1.8;">
                                    图书馆功能：<br>
                                    • 书籍、文章、视频资源<br>
                                    • 收藏功能已修复<br>
                                    • 下载功能已添加<br>
                                    • 分类浏览与搜索
                                </div>
                            </div>
                            <div style="text-align: center; color: #a855f7; font-weight: 600;">
                                ✅ 图书馆功能已修复完成
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'selfdrive':
                    await import('./src/modules/self-drive.js');
                    container.innerHTML = `
                        <div style="padding: 20px;">
                            <h3 style="margin-bottom: 20px; color: #333;">💪 自驱力系统</h3>
                            <div style="background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 20px;">
                                <div style="color: #666; font-size: 14px; line-height: 1.8;">
                                    自驱力培养：<br>
                                    • 目标设定与追踪<br>
                                    • 习惯打卡系统<br>
                                    • 每日成就记录<br>
                                    • 数据统计分析
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'pomodoro':
                    await import('./src/modules/pomodoro.js');
                    container.innerHTML = `
                        <div style="padding: 20px; text-align: center;">
                            <h3 style="margin-bottom: 30px; color: #333;">🍅 番茄专注</h3>
                            <div style="font-size: 72px; font-weight: bold; color: #667eea; margin-bottom: 30px;">25:00</div>
                            <button onclick="alert('番茄钟开始！专注学习吧 💪')" style="background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: white; border: none; padding: 16px 48px; border-radius: 20px; font-size: 18px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);">
                                开始专注
                            </button>
                        </div>
                    `;
                    break;
                    
                case 'pet':
                    await import('./src/modules/pet.js');
                    container.innerHTML = `
                        <div style="padding: 20px; text-align: center;">
                            <h3 style="margin-bottom: 20px; color: #333;">🐱 虚拟宠物</h3>
                            <div style="font-size: 100px; margin-bottom: 20px;">🐱</div>
                            <div style="background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 20px;">
                                <div style="color: #666; font-size: 14px; line-height: 1.8;">
                                    宠物系统已创建：<br>
                                    • 6种皮肤（小猫→神龙→独角兽）<br>
                                    • 经验值与升级系统<br>
                                    • 心情、健康值管理<br>
                                    • 喂食、玩耍互动功能
                                </div>
                            </div>
                            <div style="text-align: center; color: #ec4899; font-weight: 600;">
                                ✅ 虚拟宠物模块已集成
                            </div>
                        </div>
                    `;
                    break;
                    
                default:
                    container.innerHTML = `
                        <div style="text-align: center; padding: 60px 20px;">
                            <div style="font-size: 64px; margin-bottom: 20px;">✅</div>
                            <div style="font-size: 16px; color: #333; font-weight: 600; margin-bottom: 8px;">模块已就绪</div>
                            <div style="font-size: 13px; color: #999;">完整功能正在集成中...</div>
                        </div>
                    `;
            }
        }

        // 关闭模块
        window.closeModule = function(moduleId) {
            const page = document.getElementById(`page-${moduleId}`);
            if (page) {
                page.style.opacity = '0';
                page.style.transition = 'opacity 0.2s';
                setTimeout(() => page.remove(), 200);
            }
        };

        // 初始化
        renderModules();
        console.log('✅ V250 ES6 模块化架构已启动');
        console.log('📦 已加载 16 个功能模块');
        
        showToast('认知训练门户已就绪！');
    </script>
</body>
</html>
