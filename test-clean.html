<!DOCTYPE html>
<html>
<head>
    <title>ES6 Clean Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .modules-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .module-card { background: white; padding: 20px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <h1>ES6 Modules Clean Test</h1>
    <div id="result"></div>
    <div id="app-container" class="modules-grid"></div>

    <script type="module">
        const result = document.getElementById('result');
        const container = document.getElementById('app-container');
        
        try {
            console.log('Start importing...');
            import('./src/modules/ui-clean.js?t=' + Date.now()).then(function(module) {
                console.log('Import success!');
                result.innerHTML = '<p style="color: green;">Import Success!</p>';
                module.renderHomePage(container);
                result.innerHTML += '<p style="color: green;">Render Success!</p>';
            }).catch(function(e) {
                console.error('Import error:', e);
                result.innerHTML = '<p style="color: red;">Error: ' + e.message + '</p>';
            });
        } catch (error) {
            console.error('Error:', error);
            result.innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
        }
    </script>
</body>
</html>
