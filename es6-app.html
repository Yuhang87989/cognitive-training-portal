<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认知训练门户 - ES6 Modules</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px 10px 80px 10px;
        }
        .welcome { color: white; padding: 20px; text-align: center; }
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
        }
        .module-card {
            background: rgba(255,255,255,0.95);
            padding: 20px 10px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .module-card:hover { transform: translateY(-4px); }
        .module-icon { font-size: 32px; margin-bottom: 8px; }
        .module-name { font-size: 14px; font-weight: 600; color: #333; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
        }
        .nav-item {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
        }
        .nav-icon { font-size: 20px; }
        .nav-label { font-size: 12px; color: #666; }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 10000;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hidden { display: none !important; }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
            background: #4caf50;
            color: white;
        }
        .module-page {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin: 10px;
            min-height: 400px;
        }
        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: #666;">正在加载 ES6 模块...</p>
    </div>

    <div class="welcome">
        <h1>👋 欢迎使用</h1>
        <p>ES6 Modules 版本 <span class="status-badge">纯ES6结构</span></p>
    </div>
    <div id="app-container" class="modules-grid"></div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.App && window.App.goHome()">
            <div class="nav-icon">🏠</div>
            <div class="nav-label">首页</div>
        </div>
        <div class="nav-item" onclick="window.showToast && window.showToast('功能开发中')">
            <div class="nav-icon">🎯</div>
            <div class="nav-label">训练</div>
        </div>
        <div class="nav-item" onclick="window.showToast && window.showToast('功能开发中')">
            <div class="nav-icon">🤖</div>
            <div class="nav-label">AI</div>
        </div>
    </div>

    <script type="module">
        console.log('🚀 ES6 Modules 开始加载');

        // 全局工具函数
        window.showToast = function(msg, duration = 2000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        };

        try {
            // ========== 导入 ES6 模块 ==========
            import { renderHomePage, renderModulePage } from './src/modules/ui.js?t=' + Date.now();
            console.log('✅ UI 模块加载成功');

            import { renderSelfDrive } from './src/modules/selfdrive.js?t=' + Date.now();
            console.log('✅ 自驱力模块加载成功');

            import { renderDeepSeek } from './src/modules/deepseek.js?t=' + Date.now();
            console.log('✅ DeepSeek模块加载成功');

            import { renderWrongBook } from './src/modules/wrongbook.js?t=' + Date.now();
            console.log('✅ 错题本模块加载成功');

            import { renderPomodoro } from './src/modules/pomodoro.js?t=' + Date.now();
            console.log('✅ 番茄钟模块加载成功');

            import { renderMethod } from './src/modules/method.js?t=' + Date.now();
            console.log('✅ 学霸方法模块加载成功');

            import { renderThinking } from './src/modules/thinking.js?t=' + Date.now();
            console.log('✅ 思维训练模块加载成功');

            // ========== 模块渲染器映射 ==========
            const moduleRenderers = {
                'selfdrive': renderSelfDrive,
                'deepseek': renderDeepSeek,
                'wrongbook': renderWrongBook,
                'pomodoro': renderPomodoro,
                'method': renderMethod,
                'thinking': renderThinking,
            };

            // ========== 全局应用对象 ==========
            window.App = {
                currentPage: 'home',
                
                goHome: function() {
                    this.currentPage = 'home';
                    const container = document.getElementById('app-container');
                    container.className = 'modules-grid';
                    renderHomePage(container);
                },

                openModule: function(moduleId) {
                    const renderFn = moduleRenderers[moduleId];
                    if (renderFn) {
                        this.currentPage = moduleId;
                        const container = document.getElementById('app-container');
                        container.className = 'module-page';
                        renderModulePage(container, moduleId, renderFn);
                    } else {
                        window.showToast('模块 ' + moduleId + ' 开发中');
                    }
                }
            };

            // ========== 初始化首页 ==========
            window.App.goHome();

            // 隐藏加载动画
            document.getElementById('loading').classList.add('hidden');
            window.showToast('🎉 ES6 Modules 全部加载成功！');
            console.log('✅ ES6 Modules 初始化完成');

        } catch (error) {
            console.error('❌ ES6 模块加载失败:', error);
            document.getElementById('loading').innerHTML = `
                <p style="color: #e74c3c; font-size: 18px; margin-bottom: 10px;">❌ 模块加载失败</p>
                <p style="color: #666; font-size: 14px; text-align: center; max-width: 300px;">${error.message || '未知错误'}</p>
            `;
        }
    </script>
</body>
</html>
