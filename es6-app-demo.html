<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES6 Modules App Demo - 认知训练门户</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #667eea15, #764ba215);
            min-height: 100vh;
        }
        
        /* 顶部导航 */
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .header-title { font-size: 18px; font-weight: 600; }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .user-avatar:hover { transform: scale(1.1); }
        
        /* 应用容器 */
        #app-container {
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 80px;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: background 0.2s;
        }
        .nav-item:hover { background: #f5f5f5; }
        .nav-item.active { background: #667eea15; color: #667eea; }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 4px; }
        .nav-label { font-size: 12px; }
        
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-secondary { background: #999; color: white; }
        
        /* 用户列表项 */
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .user-item:hover { background: #f5f5f5; }
        .user-item.current { background: #e8f4ff; border: 1px solid #667eea; }
        .user-avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .user-info h4 { font-size: 14px; margin-bottom: 2px; }
        .user-info p { font-size: 12px; color: #999; }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 99999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        /* 模块卡片 */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 20px;
        }
        .module-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .module-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .module-icon { font-size: 36px; margin-bottom: 8px; display: block; }
        .module-name { font-size: 14px; font-weight: 500; color: #333; }
        
        /* 欢迎区域 */
        .welcome-section {
            padding: 20px;
        }
        .welcome-title {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .welcome-subtitle {
            color: #666;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <div class="header-title">🧠 认知训练门户</div>
        <div class="user-avatar" id="header-avatar">👤</div>
    </div>

    <!-- 应用容器 -->
    <div id="app-container">
        <!-- 内容由 JS 动态渲染 -->
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item active" data-page="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </div>
        <div class="nav-item" data-page="study">
            <span class="nav-icon">📚</span>
            <span class="nav-label">学习</span>
        </div>
        <div class="nav-item" data-page="tools">
            <span class="nav-icon">🛠️</span>
            <span class="nav-label">工具</span>
        </div>
        <div class="nav-item" data-page="profile">
            <span class="nav-icon">👤</span>
            <span class="nav-label">我的</span>
        </div>
    </div>

    <!-- 用户切换模态框 -->
    <div class="modal-overlay" id="user-switch-modal">
        <div class="modal-content">
            <div class="modal-title">👥 选择用户</div>
            <div id="user-list-container"></div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="btn-modal-create">创建新用户</button>
                <button class="btn btn-secondary" id="btn-modal-close">关闭</button>
            </div>
        </div>
    </div>

    <!-- 创建用户模态框 -->
    <div class="modal-overlay" id="create-user-modal">
        <div class="modal-content">
            <div class="modal-title">➕ 创建新用户</div>
            <input type="text" id="new-user-name" placeholder="输入用户名">
            <div class="modal-footer">
                <button class="btn btn-primary" id="btn-create-submit">创建</button>
                <button class="btn btn-secondary" id="btn-create-cancel">取消</button>
            </div>
        </div>
    </div>

    <!-- ES6 Modules 入口 -->
    <script type="module" src="./src/main.js"></script>
    
    <!-- 应用初始化脚本 -->
    <script type="module">
        import { showToast } from './src/utils.js';
        import { UserModule } from './src/user.js';
        import { navigateTo } from './src/modules/ui.js';
        
        console.log('🎯 ES6 Modules 应用 Demo 启动...');
        
        // 底部导航切换
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                // 移除所有 active
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                // 添加当前 active
                item.classList.add('active');
                
                const page = item.dataset.page;
                
                if (page === 'home') {
                    navigateTo('home');
                } else {
                    showToast(`${page} 页面开发中...`);
                }
            });
        });
        
        // 头像点击打开用户切换
        document.getElementById('header-avatar').addEventListener('click', () => {
            UserModule.showUserSwitchModal();
        });
        
        // 绑定模态框按钮
        document.getElementById('btn-modal-close').addEventListener('click', () => {
            UserModule.closeUserSwitchModal();
        });
        
        document.getElementById('btn-modal-create').addEventListener('click', () => {
            UserModule.closeUserSwitchModal();
            UserModule.showCreateUserModal();
        });
        
        document.getElementById('btn-create-submit').addEventListener('click', () => {
            const nameInput = document.getElementById('new-user-name');
            if (nameInput.value.trim()) {
                // 创建用户
                const newUser = {
                    id: 'user_' + Date.now(),
                    name: nameInput.value.trim(),
                    grade: '未设置',
                    difficulty: 1,
                    createdAt: new Date().toISOString()
                };
                
                // 保存到本地存储
                const data = JSON.parse(localStorage.getItem('cognitive_training_data') || '{"users":[]}');
                if (!data.users) data.users = [];
                data.users.push(newUser);
                data.currentUser = newUser.id;
                localStorage.setItem('cognitive_training_data', JSON.stringify(data));
                
                showToast(`用户 "${newUser.name}" 创建成功！`);
                nameInput.value = '';
                UserModule.closeCreateUserModal();
                
                // 刷新页面
                setTimeout(() => location.reload(), 800);
            } else {
                showToast('请输入用户名');
            }
        });
        
        document.getElementById('btn-create-cancel').addEventListener('click', () => {
            UserModule.closeCreateUserModal();
        });
        
        // 初始渲染首页
        navigateTo('home');
        
        console.log('✅ ES6 Modules 应用初始化完成！');
    </script>
</body>
</html>
