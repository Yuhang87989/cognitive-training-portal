<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES6 Modules - 番茄钟 Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #FF9A63 0%, #E87A4E 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .demo-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .demo-header {
            background: linear-gradient(135deg, #FF9A63 0%, #E87A4E 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .demo-header h1 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        .demo-header p {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .module-page {
            padding: 0;
        }
        
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            background: #f8f9fa;
        }
        
        .page-header h2 {
            font-size: 18px;
            color: #333;
            flex: 1;
            text-align: center;
            margin: 0 40px;
        }
        
        .back-btn, .settings-btn {
            padding: 8px 16px;
            background: #FF9A63;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .settings-btn {
            padding: 8px 12px;
            font-size: 16px;
        }
        
        .pomodoro-container {
            padding: 20px;
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 24px;
            padding: 16px;
            background: #fff8f3;
            border-radius: 12px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #E87A4E;
            display: block;
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
        }
        
        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: #f5f5f5;
            padding: 4px;
            border-radius: 12px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-weight: bold;
            color: #E87A4E;
        }
        
        .timer-circle {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 24px;
        }
        
        .timer-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }
        
        .timer-bg {
            fill: none;
            stroke: #f0f0f0;
            stroke-width: 8;
        }
        
        .timer-progress {
            fill: none;
            stroke: linear-gradient(135deg, #FF9A63, #E87A4E);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 565;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }
        
        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .timer-display {
            font-size: 48px;
            font-weight: bold;
            color: #333;
            font-family: 'SF Mono', 'Monaco', monospace;
        }
        
        .mode-label {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }
        
        .timer-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }
        
        .control-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .control-btn:hover {
            transform: translateY(-2px);
        }
        
        .control-btn.primary {
            background: linear-gradient(135deg, #FF9A63, #E87A4E);
            color: white;
        }
        
        .control-btn.pause {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }
        
        .control-btn.secondary {
            background: #f5f5f5;
            color: #666;
        }
        
        .control-btn.skip {
            background: #e3f2fd;
            color: #2196f3;
        }
        
        .pomodoros-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: all 0.3s;
        }
        
        .dot.completed {
            background: linear-gradient(135deg, #FF9A63, #E87A4E);
            box-shadow: 0 0 8px rgba(255, 154, 99, 0.5);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #FF9A63;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #FF9A63, #E87A4E);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .login-btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 12px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        
        @keyframes slideOut {
            from { opacity: 1; transform: translate(-50%, 0); }
            to { opacity: 0; transform: translate(-50%, -20px); }
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="demo-header">
            <h1>🍅 ES6 Modules Demo - 番茄钟</h1>
            <p>测试 ES6 模块化架构下的番茄钟功能</p>
        </div>
        <div id="app-container"></div>
    </div>
    
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div id="detail-content"></div>
        </div>
    </div>

    <script type="module">
        // 导入所有模块
        import './src/config.js';
        import './src/utils.js';
        import './src/storage.js';
        import './src/db.js';
        import './src/user.js';
        import './src/modules/pomodoro.js';
        import { initUI } from './src/modules/ui.js';
        
        // 初始化应用
        window.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 ES6 Modules Demo 启动...');
            initUI();
        });
    </script>
</body>
</html>
