<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>认知训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--blue:#3377FF;--bg:#F5F6FA;--white:#FFFFFF;--text-dark:#333;--text-gray:#666;--text-light:#999;--border:#F2F4F7;--orange:#E87A4E}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:20px}
.header{background:linear-gradient(135deg,var(--blue),#4A80F5);color:white;padding:16px;border-radius:0 0 24px 24px}
.header-top{display:flex;justify-content:space-between;align-items:center}
.app-logo{width:44px;height:44px;background:linear-gradient(135deg,var(--blue),#FF9A63);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.user-avatar{width:36px;height:36px;background:linear-gradient(135deg,#FFD4B8,#FFB6C1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#fff;cursor:pointer}
.greeting{margin-top:12px;font-size:14px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.stat{background:rgba(255,255,255,0.2);border-radius:12px;padding:10px;text-align:center}
.stat-value{font-size:18px;font-weight:bold}
.stat-label{font-size:10px;opacity:0.9}
.modules{padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.module{background:white;border-radius:16px;padding:14px 8px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:transform 0.2s}
.module:active{transform:scale(0.96)}
.module-icon{font-size:26px;margin-bottom:6px}
.module-name{font-size:12px;font-weight:bold;color:#333}
.module-desc{font-size:9px;color:#999;margin-top:2px}
/* 页面样式 */
.page{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;flex-direction:column}
.page.active{display:flex}
.page-header{background:white;padding:12px 16px;display:flex;align-items:center;border-bottom:1px solid #eee}
.page-back{font-size:20px;cursor:pointer;padding:8px}
.page-title{flex:1;font-size:16px;font-weight:bold;text-align:center}
.page-content{flex:1;overflow-y:auto;padding:12px}
/* 卡片样式 */
.card{background:white;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.card-title{font-size:14px;font-weight:bold;margin-bottom:12px}
/* 通用元素 */
.btn{background:var(--blue);color:white;border:none;padding:12px 20px;border-radius:12px;cursor:pointer;font-size:14px;width:100%;margin-bottom:8px}
.btn:active{opacity:0.8}
.btn-secondary{background:#f0f0f0;color:#333}
.btn-orange{background:var(--orange);color:white}
.item{background:#f8f9fa;border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer}
.item:active{background:#e8f4ff}
.item-title{font-size:14px;font-weight:bold}
.item-desc{font-size:12px;color:#666;margin-top:4px}
.badge{display:inline-block;background:var(--blue);color:white;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px}
.progress-bar{height:8px;background:#e0e0e0;border-radius:4px;margin-top:8px}
.progress-fill{height:100%;background:var(--blue);border-radius:4px}
/* 下拉菜单 */
.dropdown{display:none;position:absolute;top:100%;right:0;background:white;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);width:200px;z-index:1000}
.dropdown.show{display:block}
.dropdown-item{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.dropdown-item.danger{color:#ff6b6b}
/* 游戏网格 */
.game-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.game-btn{background:white;border-radius:16px;padding:16px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.game-btn:active{transform:scale(0.95)}
.game-icon{font-size:28px;margin-bottom:8px}
.game-name{font-size:12px;font-weight:bold;color:#333}
/* 游戏棋盘 */
.game-board{display:grid;gap:8px;margin:0 auto;max-width:300px}
.game-board.size-3{grid-template-columns:repeat(3,1fr)}
.game-board.size-4{grid-template-columns:repeat(4,1fr)}
.game-cell{aspect-ratio:1;background:#f0f0f0;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer}
.game-cell:active{transform:scale(0.95)}
/* 模态框 */
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:2000;padding:20px}
.modal.show{display:flex}
.modal-content{background:white;border-radius:20px;padding:24px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:bold;text-align:center;margin-bottom:16px}
/* 聊天样式 */
.chat-container{flex:1;display:flex;flex-direction:column;background:#f8f9fa}
.chat-messages{flex:1;overflow-y:auto;padding:12px}
.chat-msg{display:flex;gap:10px;margin-bottom:12px}
.chat-msg.user{flex-direction:row-reverse}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.chat-msg.user .chat-avatar{background:linear-gradient(135deg,#FF9A63,#E87A4E)}
.chat-bubble{max-width:75%;padding:10px 14px;border-radius:16px;background:white;font-size:14px;line-height:1.5}
.chat-msg.user .chat-bubble{background:var(--blue);color:white}
.chat-input-area{padding:12px;background:white;border-top:1px solid #eee;display:flex;gap:8px}
.chat-input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:20px;font-size:14px;outline:none}
.chat-send{padding:10px 18px;background:var(--blue);border:none;border-radius:20px;color:white;font-size:14px;cursor:pointer}
/* 教师列表 */
.teacher-list{display:flex;gap:12px;padding:12px;overflow-x:auto}
.teacher-item{display:flex;flex-direction:column;align-items:center;padding:10px 8px;border-radius:12px;cursor:pointer;background:white;border:2px solid transparent;flex-shrink:0;min-width:70px}
.teacher-item.active{border-color:#667eea;background:rgba(102,126,234,0.1)}
.teacher-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px}
.teacher-name{font-size:12px;font-weight:600;margin-top:4px}
.teacher-subject{font-size:10px;color:#999}
/* 思维训练选项 */
.thinking-options{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.thinking-option{padding:10px;background:#f5f5f5;border-radius:8px;font-size:13px;text-align:center;cursor:pointer;border:2px solid transparent}
.thinking-option.selected{border-color:var(--blue);background:rgba(51,119,255,0.1)}
.thinking-option.correct{border-color:#43E97B;background:rgba(67,233,123,0.1)}
.thinking-option.wrong{border-color:#FF6B6B;background:rgba(255,107,107,0.1)}
/* 方法卡片 */
.method-card{background:white;border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer}
.method-title{font-size:14px;font-weight:600;margin-bottom:8px}
/* 题目卡片 */
.topic-card{background:white;border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer}
.topic-header{padding:14px;color:white;border-radius:10px 10px 0 0}
.topic-title{font-size:14px;font-weight:600}
.topic-subtitle{font-size:12px;opacity:0.9;margin-top:4px}
.topic-footer{padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
/* 练习题样式 */
.practice-card{background:white;border-radius:12px;padding:16px;margin-bottom:10px}
.practice-question{font-size:14px;margin-bottom:12px;line-height:1.6}
.practice-result{padding:10px;border-radius:8px;margin-top:8px;font-size:14px}
.practice-result.correct{background:#e8f5e9;color:#2e7d32}
.practice-result.wrong{background:#ffebee;color:#c62828}
/* 日历样式 */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:12px}
.calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;cursor:pointer}
.calendar-day.checked{background:var(--blue);color:white}
.calendar-day.today{background:rgba(255,149,0,0.2);color:var(--orange);font-weight:bold}
.calendar-day.disabled{color:#ccc;cursor:not-allowed}
/* 任务样式 */
.plan-task{display:flex;align-items:center;gap:12px;padding:12px;background:#f5f5f5;border-radius:12px;margin-bottom:8px;cursor:pointer}
.plan-task.completed{opacity:0.6}
.task-checkbox{width:24px;height:24px;border-radius:50%;border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-checkbox.checked{background:var(--blue);color:white}
.task-text{flex:1;font-size:14px}
.task-time{font-size:11px;color:#999}
/* Toast提示 */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:12px 24px;border-radius:20px;font-size:14px;z-index:9999;animation:fadeIn 0.3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* 加载动画 */
.loading-dots{display:inline-flex;gap:4px}
.loading-dots span{width:8px;height:8px;background:var(--blue);border-radius:50%;animation:dot 1.4s infinite}
.loading-dots span:nth-child(1){animation-delay:-0.32s}
.loading-dots span:nth-child(2){animation-delay:-0.16s}
@keyframes dot{0%,80%,100%{transform:scale(0)}50%{transform:scale(1)}}
/* 雷达图容器 */
.radar-container{position:relative;width:200px;height:200px;margin:10px auto}
</style>
</head>
<body>

<!-- 首页 -->
<div class="header">
<div class="header-top">
<div style="display:flex;align-items:center"><span style="font-size:24px">🧠</span><span style="font-size:18px;font-weight:bold;margin-left:8px">认知训练</span></div>
<div style="position:relative">
<div class="user-avatar" onclick="toggleMenu()">邱</div>
<div class="dropdown" id="menu">
<div class="dropdown-item" onclick="openPage('settings')"><span>⚙️</span><span>设置</span></div>
<div class="dropdown-item danger" onclick="clearData()"><span>🗑️</span><span>清除数据</span></div>
</div>
</div>
</div>
<div class="greeting"><span id="name">邱宇菲</span>，今天也要加油哦 💪</div>
<div class="stats">
<div class="stat"><div class="stat-value" id="stat-questions">0</div><div class="stat-label">提问</div></div>
<div class="stat"><div class="stat-value" id="stat-correct">0%</div><div class="stat-label">正确率</div></div>
<div class="stat"><div class="stat-value" id="stat-minutes">0</div><div class="stat-label">分钟</div></div>
<div class="stat"><div class="stat-value" id="stat-streak">0</div><div class="stat-label">连续</div></div>
</div>
</div>

<div class="modules">
<div class="module" onclick="openPage('avatar')"><div class="module-icon">🎓</div><div class="module-name">AI数字分身</div><div class="module-desc">5位AI老师</div></div>
<div class="module" onclick="openPage('practice')"><div class="module-icon">🎯</div><div class="module-name">AI精准练</div><div class="module-desc">薄弱点诊断</div></div>
<div class="module" onclick="openPage('map')"><div class="module-icon">🧠</div><div class="module-name">认知地图</div><div class="module-desc">能力可视化</div></div>
<div class="module" onclick="openPage('plan')"><div class="module-icon">📅</div><div class="module-name">学习计划</div><div class="module-desc">Week1-6训练</div></div>
<div class="module" onclick="openPage('topics')"><div class="module-icon">📚</div><div class="module-name">母题训练</div><div class="module-desc">126道经典题</div></div>
<div class="module" onclick="openPage('method')"><div class="module-icon">💡</div><div class="module-name">学霸方法</div><div class="module-desc">高效学习技巧</div></div>
<div class="module" onclick="openPage('thinking')"><div class="module-icon">🧩</div><div class="module-name">思维训练</div><div class="module-desc">逻辑推理</div></div>
<div class="module" onclick="openPage('games')"><div class="module-icon">🎮</div><div class="module-name">训练游戏</div><div class="module-desc">8款益智游戏</div></div>
</div>

<!-- 页面容器 -->
<div id="page-avatar" class="page"><div class="page-header"><div class="page-back" onclick="closePage()">←</div><div class="page-title">🎓 AI数字分身</div></div><div class="page-content" id="content-avatar"></div></div>
<div id="page-practice" class="page"><div class="page-header"><div class="page-back" onclick="closePage()">←</div><div class="page-title">🎯 AI精准练</div></div><div class="page-content" id="content-practice"></div></div>
<div id="page-map" class="page"><div class="page-header"><div class="page-back" onclick="closePage()">←</div><div class="page-title">🧠 认知地图</div></div><div class="page-content" id="content-map"></div></div>
<div id="page-plan" class="page"><div class="page-header"><div class="page-back" onclick="closePage()">←</div><div class="page-title">📅 学习计划</div></div><div class="page-content" id="content-plan"></div></div>
<div id="page-topics" class="page"><div class="page-header"><div class="page-back" onclick="closePage()">←</div><div class="page-title">📚 母题训练</div></div><div class="page-content" id="content-topics"></div></div>
<div id="page-method" class="page"><div class="page-header"><div class="page-back" onclick="closePage()">←</div><div class="page-title">💡 学霸方法</div></div><div class="page-content" id="content-method"></div></div>
<div id="page-thinking" class="page"><div class="page-header"><div class="page-back" onclick="closePage()">←</div><div class="page-title">🧩 思维训练</div></div><div class="page-content" id="content-thinking"></div></div>
<div id="page-games" class="page"><div class="page-header"><div class="page-back" onclick="closePage()">←</div><div class="page-title">🎮 训练游戏</div></div><div class="page-content" id="content-games"></div></div>
<div id="page-settings" class="page"><div class="page-header"><div class="page-back" onclick="closePage()">←</div><div class="page-title">⚙️ 设置</div></div><div class="page-content" id="content-settings"></div></div>

<!-- 通用模态框 -->
<div class="modal" id="detail-modal">
<div class="modal-content" id="detail-content"></div>
</div>

<script>
// ====== 全局配置 ======
const STORAGE_KEY = 'cognitive_training_full';
const DEEPSEEK_API_KEY = 'sk-8413f72a3f084fb08c84389555a76d37';
const DEEPSEEK_API_URL = 'https://api.deepseek.com/chat/completions';

// ====== 数据存储 ======
function loadData() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return getDefaultData();
        const data = JSON.parse(raw);
        if (!data || typeof data !== 'object') return getDefaultData();
        return data;
    } catch(e) {
        return getDefaultData();
    }
}

function getDefaultData() {
    return {
        user: {
            name: '邱宇菲',
            grade: 7,
            difficulty: 1,
            abilities: { attention: 65, memory: 60, logic: 70, creativity: 55, problem: 65, strategy: 60 },
            knowledge: { math: 30, chinese: 30, english: 30, physics: 30, chemistry: 30 },
            gameScores: {},
            studyDays: {},
            planTasks: {},
            chatHistory: {},
            wrongNotes: [],
            practiceRecords: [],
            todayStats: { questions: 0, correct: 0, minutes: 0 },
            aiChatCount: 0
        }
    };
}

function saveData(data) {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {}
}

function getUser() {
    return loadData().user;
}

function syncUser() {
    const data = loadData();
    saveData(data);
}

// ====== 用户状态 ======
var user = getUser();
var currentTeacher = 'math';
var currentThinkingType = 'logic';

// ====== UI更新 ======
function updateStats() {
    const data = loadData();
    const u = data.user;
    document.getElementById('name').textContent = u.name;
    document.getElementById('stat-questions').textContent = u.aiChatCount || 0;
    const correctRate = u.todayStats.questions > 0 ? Math.round(u.todayStats.correct / u.todayStats.questions * 100) : 0;
    document.getElementById('stat-correct').textContent = correctRate + '%';
    document.getElementById('stat-minutes').textContent = u.todayStats.minutes || 0;
    // 计算连续天数
    let streak = 0;
    const studyDays = u.studyDays || {};
    for (let i = 0; i < 365; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = d.toISOString().split('T')[0];
        if (studyDays[key]) streak++;
        else if (i > 0) break;
    }
    document.getElementById('stat-streak').textContent = streak;
}

// ====== 页面切换 ======
function toggleMenu() {
    document.getElementById('menu').classList.toggle('show');
}
document.addEventListener('click', function(e) {
    if (!e.target.closest('.user-avatar') && !e.target.closest('.dropdown')) {
        document.getElementById('menu').classList.remove('show');
    }
});

function openPage(n) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    var p = document.getElementById('page-' + n);
    var c = document.getElementById('content-' + n);
    if (p && c) {
        p.classList.add('active');
        render(n, c);
    }
}

function closePage() {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
}

// ====== Toast提示 ======
function showToast(msg) {
    var existing = document.querySelector('.toast');
    if (existing) existing.remove();
    var toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 2000);
}

// ====== 模态框 ======
function openModal(content) {
    document.getElementById('detail-content').innerHTML = content;
    document.getElementById('detail-modal').classList.add('show');
}
function closeModal() {
    document.getElementById('detail-modal').classList.remove('show');
}

// ====== render函数 ======
function render(n, e) {
    var h = '';
    switch(n) {
        case 'avatar':
            h = renderAvatar();
            break;
        case 'practice':
            h = renderPractice();
            break;
        case 'map':
            h = renderMap();
            break;
        case 'plan':
            h = renderPlan();
            break;
        case 'topics':
            h = renderTopics();
            break;
        case 'method':
            h = renderMethod();
            break;
        case 'thinking':
            h = renderThinking();
            break;
        case 'games':
            h = renderGames();
            break;
        case 'settings':
            h = renderSettings();
            break;
    }
    e.innerHTML = h;
}

// ====== AI数字分身 ======
const teachers = [
    { id: 'math', name: '小明', subject: '数学', avatar: '👨‍🏫', desc: '擅长代数几何' },
    { id: 'english', name: 'Emma', subject: '英语', avatar: '👩‍🏫', desc: '纯正发音教学' },
    { id: 'chinese', name: '文老师', subject: '语文', avatar: '👨‍🏫', desc: '古诗词鉴赏' },
    { id: 'physics', name: '牛顿', subject: '物理', avatar: '👨‍🏫', desc: '实验演示' },
    { id: 'chemistry', name: '门捷列夫', subject: '化学', avatar: '👩‍🏫', desc: '元素周期' }
];

function renderAvatar() {
    const u = getUser();
    const history = u.chatHistory[currentTeacher] || [];
    let html = '<div class="card"><div class="card-title">选择AI老师</div><div class="teacher-list">';
    teachers.forEach(function(t) {
        html += '<div class="teacher-item ' + (t.id === currentTeacher ? 'active' : '') + '" onclick="switchTeacher(\'' + t.id + '\')">';
        html += '<div class="teacher-avatar">' + t.avatar + '</div>';
        html += '<div class="teacher-name">' + t.name + '</div>';
        html += '<div class="teacher-subject">' + t.subject + '</div></div>';
    });
    html += '</div></div>';
    
    // 聊天区域
    html += '<div class="chat-container" style="height:400px;margin-bottom:12px;">';
    html += '<div class="chat-messages" id="chat-messages">';
    
    if (history.length === 0) {
        const currentTeacherData = teachers.find(t => t.id === currentTeacher);
        html += '<div class="chat-msg"><div class="chat-avatar">' + currentTeacherData.avatar + '</div>';
        html += '<div class="chat-bubble">你好！我是' + currentTeacherData.name + '，' + currentTeacherData.desc + '。有什么问题可以问我哦！</div></div>';
    } else {
        history.forEach(function(msg) {
            if (msg.role === 'user') {
                html += '<div class="chat-msg user"><div class="chat-avatar"></div><div class="chat-bubble">' + escapeHtml(msg.content) + '</div></div>';
            } else {
                const t = teachers.find(t => t.id === currentTeacher);
                html += '<div class="chat-msg"><div class="chat-avatar">' + t.avatar + '</div>';
                html += '<div class="chat-bubble">' + escapeHtml(msg.content) + '</div></div>';
            }
        });
    }
    html += '</div></div>';
    
    html += '<div class="chat-input-area">';
    html += '<input type="text" class="chat-input" id="chat-input" placeholder="输入问题..." onkeydown="if(event.key===\'Enter\')sendMessage()">';
    html += '<button class="chat-send" onclick="sendMessage()">发送</button></div>';
    
    return html;
}

function switchTeacher(id) {
    currentTeacher = id;
    var c = document.getElementById('content-avatar');
    if (c) render('avatar', c);
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function sendMessage() {
    var input = document.getElementById('chat-input');
    if (!input || !input.value.trim()) return;
    
    var msg = input.value.trim();
    input.value = '';
    
    var data = loadData();
    var u = data.user;
    u.chatHistory[currentTeacher] = u.chatHistory[currentTeacher] || [];
    u.chatHistory[currentTeacher].push({ role: 'user', content: msg });
    u.aiChatCount = (u.aiChatCount || 0) + 1;
    u.todayStats.questions = (u.todayStats.questions || 0) + 1;
    saveData(data);
    
    var messagesEl = document.getElementById('chat-messages');
    var t = teachers.find(t => t.id === currentTeacher);
    
    // 添加用户消息
    messagesEl.innerHTML += '<div class="chat-msg user"><div class="chat-avatar"></div><div class="chat-bubble">' + escapeHtml(msg) + '</div></div>';
    messagesEl.scrollTop = messagesEl.scrollHeight;
    
    // 添加加载中
    var loadingId = 'loading-' + Date.now();
    messagesEl.innerHTML += '<div class="chat-msg" id="' + loadingId + '"><div class="chat-avatar">' + t.avatar + '</div><div class="chat-bubble"><span class="loading-dots"><span></span><span></span><span></span></span></div></div>';
    messagesEl.scrollTop = messagesEl.scrollHeight;
    
    // 调用AI
    var response = await callDeepSeek(msg);
    var loadingEl = document.getElementById(loadingId);
    if (loadingEl) {
        loadingEl.querySelector('.chat-bubble').innerHTML = escapeHtml(response);
        if (response.includes('DeepSeek账户余额不足') || response.includes('API调用失败')) {
            u.todayStats.correct = Math.max(0, (u.todayStats.correct || 0));
        } else {
            u.todayStats.correct = (u.todayStats.correct || 0) + 1;
        }
        saveData(data);
    }
    
    updateStats();
}

async function callDeepSeek(message) {
    var teacher = teachers.find(t => t.id === currentTeacher);
    var systemPrompt = '你是一位专业的' + teacher.subject + '老师，名叫' + teacher.name + '。你擅长' + teacher.desc + '。请用友善、专业的方式回答学生的问题。如果涉及计算，请给出详细步骤。';
    
    var data = loadData();
    var u = data.user;
    var history = u.chatHistory[currentTeacher] || [];
    
    var messages = [{ role: 'system', content: systemPrompt }];
    history.forEach(function(m) {
        messages.push({ role: m.role, content: m.content });
    });
    messages.push({ role: 'user', content: message });
    
    try {
        var response = await fetch(DEEPSEEK_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
            body: JSON.stringify({ model: 'deepseek-chat', messages: messages, temperature: 0.7, max_tokens: 1000 })
        });
        
        if (!response.ok) {
            var errorData = await response.json().catch(function() { return {}; });
            if (response.status === 402 || response.status === 400) {
                return '抱歉，AI服务暂时不可用，请稍后再试。';
            }
            throw new Error(errorData.error && errorData.error.message || 'API调用失败');
        }
        
        var result = await response.json();
        var reply = result.choices[0].message.content;
        
        // 保存AI回复
        u.chatHistory[currentTeacher] = u.chatHistory[currentTeacher] || [];
        u.chatHistory[currentTeacher].push({ role: 'assistant', content: reply });
        saveData(data);
        
        return reply;
    } catch(error) {
        return '抱歉，服务出现问题: ' + error.message + '。请稍后再试。';
    }
}

function switchPracticeSubject(subject) {
    currentPracticeSubject = subject;
    currentQuestionIndex = 0;
    var c = document.getElementById('content-practice');
    if (c) render('practice', c);
}

function answerPractice(selected, correct, subject) {
    var options = document.querySelectorAll('#practice-area .thinking-option');
    var data = loadData();
    var u = data.user;
    
    options.forEach(function(opt, i) {
        opt.onclick = null;
        if (i === correct) opt.classList.add('correct');
        else if (i === selected && selected !== correct) opt.classList.add('wrong');
    });
    
    if (selected === correct) {
        u.knowledge[subject] = Math.min(100, (u.knowledge[subject] || 30) + 5);
        u.todayStats.correct = (u.todayStats.correct || 0) + 1;
        showToast('✓ 回答正确！');
    } else {
        u.knowledge[subject] = Math.max(0, (u.knowledge[subject] || 30) - 3);
        u.wrongNotes = u.wrongNotes || [];
        u.wrongNotes.push({ question: practiceQuestions[subject][currentQuestionIndex % practiceQuestions[subject].length].q, answer: practiceQuestions[subject][currentQuestionIndex % practiceQuestions[subject].length].opts[correct] });
        showToast('✗ 回答错误');
    }
    
    u.todayStats.questions = (u.todayStats.questions || 0) + 1;
    saveData(data);
    updateStats();
    
    currentQuestionIndex++;
    setTimeout(function() {
        var c = document.getElementById('content-practice');
        if (c) render('practice', c);
    }, 1500);
}

function renderMap() {
    const u = getUser();
    const abilities = u.abilities || { attention: 65, memory: 60, logic: 70, creativity: 55, problem: 65, strategy: 60 };
    
    let html = '<div class="card"><div class="card-title">六维认知能力</div>';
    
    const abilityNames = {
        attention: { name: '🎯 注意力', desc: '专注力和集中能力' },
        memory: { name: '🧠 记忆力', desc: '信息存储和提取' },
        logic: { name: '📊 逻辑力', desc: '推理和分析能力' },
        creativity: { name: '🎨 创造力', desc: '创新思维' },
        problem: { name: '💡 思维力', desc: '问题解决能力' },
        strategy: { name: '⚡ 反应力', desc: '快速决策能力' }
    };
    
    for (var key in abilities) {
        var ability = abilityNames[key];
        if (!ability) continue;
        html += '<div class="item">';
        html += '<div class="item-title">' + ability.name + ' <span style="font-size:12px;color:var(--blue)">' + abilities[key] + '分</span></div>';
        html += '<div class="item-desc">' + ability.desc + '</div>';
        html += '<div class="progress-bar"><div class="progress-fill" style="width:' + abilities[key] + '%"></div></div>';
        html += '</div>';
    }
    
    html += '</div>';
    
    // 雷达图示意
    html += '<div class="card"><div class="card-title">能力雷达图</div>';
    html += '<div class="radar-container">';
    html += '<svg viewBox="0 0 200 200" style="width:100%;height:100%;">';
    // 六边形背景
    var cx = 100, cy = 100, r = 80;
    var points = [];
    for (var i = 0; i < 6; i++) {
        var angle = (i * 60 - 90) * Math.PI / 180;
        points.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
    }
    // 背景六边形
    for (var j = 1; j <= 5; j++) {
        var levelPoints = [];
        for (var i = 0; i < 6; i++) {
            var angle = (i * 60 - 90) * Math.PI / 180;
            levelPoints.push(cx + (r * j / 5) * Math.cos(angle) + ',' + (cy + (r * j / 5) * Math.sin(angle)));
        }
        html += '<polygon points="' + levelPoints.join(' ') + '" fill="none" stroke="#e0e0e0" stroke-width="1"/>';
    }
    // 轴线
    for (var i = 0; i < 6; i++) {
        html += '<line x1="' + cx + '" y1="' + cy + '" x2="' + points[i].x + '" y2="' + points[i].y + '" stroke="#e0e0e0" stroke-width="1"/>';
    }
    // 数据区域
    var values = [abilities.attention / 100, abilities.memory / 100, abilities.logic / 100, abilities.creativity / 100, abilities.problem / 100, abilities.strategy / 100];
    var dataPoints = [];
    for (var i = 0; i < 6; i++) {
        var angle = (i * 60 - 90) * Math.PI / 180;
        dataPoints.push((cx + r * values[i] * Math.cos(angle)) + ',' + (cy + r * values[i] * Math.sin(angle)));
    }
    html += '<polygon points="' + dataPoints.join(' ') + '" fill="rgba(51,119,255,0.3)" stroke="var(--blue)" stroke-width="2"/>';
    // 标签
    var labels = ['注意力', '记忆力', '逻辑力', '创造力', '思维力', '反应力'];
    for (var i = 0; i < 6; i++) {
        var angle = (i * 60 - 90) * Math.PI / 180;
        var lx = cx + (r + 20) * Math.cos(angle);
        var ly = cy + (r + 20) * Math.sin(angle);
        html += '<text x="' + lx + '" y="' + ly + '" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#666">' + labels[i] + '</text>';
    }
    html += '</svg></div></div>';
    
    // 知识掌握度
    html += '<div class="card"><div class="card-title">知识掌握度</div>';
    const knowledgeNames = { math: '📐 数学', chinese: '📝 语文', english: '🔤 英语', physics: '⚡ 物理', chemistry: '🧪 化学' };
    for (var k in u.knowledge) {
        var kn = knowledgeNames[k];
        if (!kn) continue;
        html += '<div class="item">';
        html += '<div class="item-title">' + kn + ' <span style="font-size:12px;color:var(--blue)">' + u.knowledge[k] + '%</span></div>';
        html += '<div class="progress-bar"><div class="progress-fill" style="width:' + u.knowledge[k] + '%"></div></div>';
        html += '</div>';
    }
    html += '</div>';
    
    return html;
}

function renderPlan() {
    const u = getUser();
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const studyDays = u.studyDays || {};
    
    let html = '<div class="card"><div class="card-title">' + (month + 1) + '月学习日历</div>';
    html += '<div class="calendar-grid">';
    ['日', '一', '二', '三', '四', '五', '六'].forEach(function(d) {
        html += '<div style="text-align:center;font-size:10px;color:#999;padding:4px;">' + d + '</div>';
    });
    for (var i = 0; i < firstDay; i++) {
        html += '<div class="calendar-day disabled"></div>';
    }
    for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        var isToday = d === today.getDate();
        var isChecked = !!studyDays[dateStr];
        html += '<div class="calendar-day' + (isChecked ? ' checked' : '') + (isToday ? ' today' : '') + '" onclick="toggleStudyDay(\'' + dateStr + '\')">' + d + '</div>';
    }
    html += '</div></div>';
    
    // 周计划
    html += '<div class="card"><div class="card-title">本周训练任务</div>';
    const weekTasks = [
        { text: '注意力训练 15分钟', time: '09:00', type: 'attention' },
        { text: '记忆力练习 20分钟', time: '14:00', type: 'memory' },
        { text: '思维训练题目 10题', time: '16:00', type: 'thinking' },
        { text: '益智游戏挑战 15分钟', time: '19:00', type: 'game' }
    ];
    const planTasks = u.planTasks || {};
    weekTasks.forEach(function(task, i) {
        var completed = planTasks['week_' + i] || false;
        html += '<div class="plan-task' + (completed ? ' completed' : '') + '" onclick="toggleTask(\'week_' + i + '\')">';
        html += '<div class="task-checkbox' + (completed ? ' checked' : '') + '">' + (completed ? '✓' : '') + '</div>';
        html += '<div><div class="task-text">' + task.text + '</div><div class="task-time">' + task.time + '</div></div></div>';
    });
    html += '</div>';
    
    // 四周计划
    html += '<div class="card"><div class="card-title">六周训练计划</div>';
    const weeks = [
        { name: 'Week 1: 基础训练', desc: '注意力+记忆力入门', progress: 71 },
        { name: 'Week 2: 能力提升', desc: '逻辑思维训练', progress: 0 },
        { name: 'Week 3: 综合应用', desc: '综合能力提升', progress: 0 },
        { name: 'Week 4: 强化训练', desc: '高阶思维训练', progress: 0 },
        { name: 'Week 5: 实战演练', desc: '模拟测试', progress: 0 },
        { name: 'Week 6: 巩固冲刺', desc: '全面复习', progress: 0 }
    ];
    weeks.forEach(function(w) {
        html += '<div class="item"><div class="item-title">' + w.name + '</div>';
        html += '<div class="item-desc">' + w.desc;
        if (w.progress > 0) {
            html += '<div class="progress-bar"><div class="progress-fill" style="width:' + w.progress + '%"></div></div>';
        } else {
            html += ' <span style="color:#999">未开始</span>';
        }

function toggleStudyDay(dateStr) {
    var data = loadData();
    var u = data.user;
    u.studyDays = u.studyDays || {};
    if (u.studyDays[dateStr]) {
        delete u.studyDays[dateStr];
    } else {
        u.studyDays[dateStr] = Date.now();
        u.todayStats.minutes = (u.todayStats.minutes || 0) + 30;
    }
    saveData(data);
    updateStats();
    var c = document.getElementById('content-plan');
    if (c) render('plan', c);
}

function toggleTask(taskId) {
    var data = loadData();
    var u = data.user;
    u.planTasks = u.planTasks || {};
    u.planTasks[taskId] = !u.planTasks[taskId];
    saveData(data);
    var c = document.getElementById('content-plan');
    if (c) render('plan', c);
}

function getTopicQuestions(categoryId) {
    if (categoryId === 'math') {
        return [
            { q: '化简: 2x + 3x = ?', opts: ['5x', '6x', '5x²', '6x²'], a: 0 },
            { q: '若 x² = 49，则 x = ?', opts: ['7', '-7', '±7', '49'], a: 2 },
            { q: '等边三角形每个内角度数是？', opts: ['60°', '90°', '45°', '120°'], a: 0 },
            { q: '计算: (-3) × (-4) = ?', opts: ['-12', '12', '-7', '7'], a: 1 },
            { q: '圆的面积公式是？', opts: ['πr²', '2πr', 'πd', 'πr'], a: 0 }
        ];
    } else if (categoryId === 'english') {
        return [
            { q: 'I ___ to school every day.', opts: ['go', 'goes', 'going', 'went'], a: 0 },
            { q: 'The sky is ___.', opts: ['blue', 'big', 'tall', 'long'], a: 0 },
            { q: 'She ___ English well.', opts: ['speaks', 'speak', 'speaking', 'spoke'], a: 0 },
            { q: 'There ___ two books on the desk.', opts: ['are', 'is', 'be', 'been'], a: 0 },
            { q: '___ you like some water?', opts: ['Would', 'Could', 'Should', 'Might'], a: 0 }
        ];
    } else if (categoryId === 'physics') {
        return [
            { q: '速度的单位是？', opts: ['m/s', 'kg', 'N', 'W'], a: 0 },
            { q: '光的传播速度约为？', opts: ['3×10⁸m/s', '3×10⁶m/s', '3×10⁴m/s', '3×10²m/s'], a: 0 },
            { q: '物体在地球上的重力加速度约为？', opts: ['9.8m/s²', '10.8m/s²', '8.8m/s²', '11.8m/s²'], a: 0 },
            { q: '水的密度是？', opts: ['1g/cm³', '2g/cm³', '0.5g/cm³', '10g/cm³'], a: 0 }
        ];
    } else {
        return [

var gameScore = 0, gameType = '', gameLevel = 1, gameTimer = null, gameStartTime = 0;
var schulteNext = 1, currentDigits = '', patternCorrect = [], patternFound = [];

function startGame(type) {
    gameType = type;
    gameScore = 0;
    gameLevel = 1;
    
    var content = '<div class="modal-title" id="game-title">' + getGameIcon(type) + ' ' + getGameName(type) + '</div>';
    content += '<div style="text-align:center;font-size:14px;color:#666;margin-bottom:12px;">得分: <span id="game-score" style="color:var(--blue);font-weight:bold;font-size:18px;">0</span></div>';

    content += '<button class="btn btn-secondary" style="margin-top:16px;" onclick="closeModal()">退出游戏</button>';
    
    openModal(content);
    
    setTimeout(function() {
        switch(type) {
            case 'schulte': startSchulte(); break;
            case 'visual': startVisual(); break;
            case 'digit': startDigit(); break;
            case 'pattern': startPattern(); break;
            case 'tap': startTap(); break;
            case 'color': startColor(); break;
            case 'diff': startDiff(); break;
            case 'reason': startReason(); break;
        }
    }, 100);
}

function getGameIcon(type) {
    var g = gameTypes.find(function(x) { return x.id === type; });
    return g ? g.icon : '🎮';
}

function getGameName(type) {
    var g = gameTypes.find(function(x) { return x.id === type; });
    return g ? g.name : '游戏';
}

// 舒尔特方格
function startSchulte() {
    document.getElementById('game-title').textContent = '🎯 舒尔特方格';
    var sizes = [3, 4, 5, 6];
    var size = sizes[Math.min(gameLevel - 1, 3)];
    var nums = Array.from({ length: size * size }, function(_, i) { return i + 1; }).sort(function() { return Math.random() - 0.5; });
    
    var board = document.getElementById('game-board');
    board.className = 'game-board size-' + size;
    board.style.display = 'grid';
    board.innerHTML = nums.map(function(n) {
        return '<div class="game-cell" onclick="checkSchulte(this,' + n + ')" style="background:white;font-size:' + (28 - size * 2) + 'px;font-weight:bold;cursor:pointer;">' + n + '</div>';
    }).join('');
    
    schulteNext = 1;
    gameStartTime = Date.now();
    if (gameTimer) clearInterval(gameTimer);
    gameTimer = setInterval(function() {
        if (Date.now() - gameStartTime > 30000) {
            clearInterval(gameTimer);
            endGame();
        }
    }, 1000);
}

function checkSchulte(el, n) {
    if (n === schulteNext) {
        el.style.background = '#43E97B';
        el.style.color = 'white';
        gameScore++;
        document.getElementById('game-score').textContent = gameScore;
        schulteNext++;
        
        if (schulteNext > el.parentElement.children.length) {
            if (gameLevel < 4) {
                gameLevel++;
                startSchulte();
            } else {
                endGame();
            }
        }
    } else {
        el.style.background = '#ff6b6b';
        setTimeout(function() { el.style.background = 'white'; }, 200);
    }
}

// 视觉搜索
function startVisual() {
    document.getElementById('game-title').textContent = '👀 视觉搜索';
    var board = document.getElementById('game-board');
    board.className = 'game-board size-4';
    board.style.display = 'grid';
    
    var targetIdx = Math.floor(Math.random() * 16);
    var colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4'];
    var targetColor = colors[Math.floor(Math.random() * 4)];
    var baseColor = colors.filter(function(c) { return c !== targetColor; })[0];
    
    board.innerHTML = Array.from({ length: 16 }, function(_, i) {
        return '<div class="game-cell" onclick="checkVisual(this,' + i + ',' + targetIdx + ')" style="background:' + (i === targetIdx ? targetColor : baseColor) + ';border-radius:4px;cursor:pointer;"></div>';
    }).join('');
    
    gameScore = 0;
    document.getElementById('game-score').textContent = '0';
}

function checkVisual(el, idx, targetIdx) {
    if (idx === targetIdx) {
        gameScore++;
        document.getElementById('game-score').textContent = gameScore;
        if (gameScore >= 10) {
            gameLevel++;
            document.getElementById('game-title').textContent = '👀 视觉搜索 Lv.' + gameLevel;
        }
        setTimeout(function() { startVisual(); }, 300);
    }
}

    document.getElementById('game-title').textContent = '🔢 数字记忆';

    board.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;';

function startPattern() {
    document.getElementById('game-title').textContent = '🎨 图形记忆';
    var board = document.getElementById('game-board');
    board.className = 'game-board size-4';
    board.style.display = 'grid';

    board.innerHTML = selected.map(function(e) {
        return '<div class="game-cell" style="background:#f0f7ff;font-size:28px;">' + e + '</div>';
    }).join('');
    
    gameScore = 0;
    document.getElementById('game-score').textContent = '0';
    
    setTimeout(function() {
        var shuffled = emojis.concat(['🍀', '🌈']).slice(0, 12).sort(function() { return Math.random() - 0.5; });

        patternFound = [];
        board.innerHTML = shuffled.map(function(e) {
            return '<div class="game-cell" onclick="checkPattern(this,\'' + e + '\')" style="background:white;font-size:24px;cursor:pointer;">?</div>';
        }).join('');
    }, 2000 + count * 300);
}

function checkPattern(el, emoji) {
    if (el.textContent === '?' && patternCorrect.indexOf(emoji) >= 0 && patternFound.indexOf(emoji) < 0) {
        el.textContent = emoji;
        el.style.background = '#f0f7ff';
        patternFound.push(emoji);
        
        if (patternFound.length === patternCorrect.length) {
            gameScore++;
            document.getElementById('game-score').textContent = gameScore;
            if (gameScore >= 2) gameLevel++;
            setTimeout(function() { startPattern(); }, 500);
        }
    } else if (el.textContent === '?') {
        el.style.background = '#ff6b6b';
        setTimeout(function() { el.textContent = '?'; el.style.background = 'white'; }, 300);
    }
}

// 快速点击
function startTap() {
    document.getElementById('game-title').textContent = '⚡ 快速点击';
    var board = document.getElementById('game-board');
    board.className = 'game-board size-3';
    board.style.cssText = 'display:grid;position:relative;min-height:200px;';
    board.innerHTML = Array(9).fill('<div class="game-cell" style="position:relative;"></div>').join('');
    
    gameScore = 0;
    document.getElementById('game-score').textContent = '0';
    gameStartTime = Date.now();
    
    if (gameTimer) clearInterval(gameTimer);
    gameTimer = setInterval(function() {
        if (Date.now() - gameStartTime > 10000) {
            clearInterval(gameTimer);
            endGame();
            return;
        }
        board.querySelectorAll('.game-cell').forEach(function(c) { c.innerHTML = ''; });
        var cells = board.querySelectorAll('.game-cell');
        cells[Math.floor(Math.random() * 9)].innerHTML = '<div onclick="event.stopPropagation();tapTarget(this)" style="width:100%;height:100%;background:var(--blue);border-radius:8px;cursor:pointer;"></div>';
    }, 800);
}

function tapTarget(el) {
    el.style.background = '#43E97B';
    gameScore++;
    document.getElementById('game-score').textContent = gameScore;
}

// 颜色识别
function startColor() {
    document.getElementById('game-title').textContent = '🌈 颜色识别';
    var board = document.getElementById('game-board');
    board.className = 'game-board size-1';
    board.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:16px;';
    
    var colorWords = [
        { w: '红', c: '#FF6B6B' },
        { w: '蓝', c: '#3377FF' },
        { w: '绿', c: '#43E97B' },
        { w: '黄', c: '#FFD93D' },
        { w: '紫', c: '#9B59B6' }
    ];
    
    gameScore = 0;
    document.getElementById('game-score').textContent = '0';
    gameStartTime = Date.now();
    
    if (gameTimer) clearInterval(gameTimer);
    gameTimer = setInterval(function() {
        if (Date.now() - gameStartTime > 30000) {
            clearInterval(gameTimer);
            endGame();
            return;
        }
        var word = colorWords[Math.floor(Math.random() * 5)];
        var wrongColor = colorWords.filter(function(c) { return c.c !== word.c; })[Math.floor(Math.random() * 4)];
        
        board.innerHTML = '<div style="font-size:48px;font-weight:bold;padding:20px;color:' + wrongColor.c + '">' + word.w + '</div>';
        board.innerHTML += '<div style="font-size:12px;color:#666;margin-top:8px;">文字显示的颜色是什么？</div>';
        board.innerHTML += '<div style="display:flex;gap:12px;margin-top:10px;">';
        board.innerHTML += '<button class="btn" style="flex:1;margin:0;padding:10px;" onclick="colorCorrect()">正确</button>';
        board.innerHTML += '<button class="btn btn-orange" style="flex:1;margin:0;padding:10px;" onclick="colorWrong()">错误</button></div>';
    }, 2500);
}

function colorCorrect() { gameScore++; document.getElementById('game-score').textContent = gameScore; }
function colorWrong() { gameScore++; document.getElementById('game-score').textContent = gameScore; }

// 找不同
function startDiff() {
    document.getElementById('game-title').textContent = '🔍 找不同';
    var board = document.getElementById('game-board');
    board.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:10px;';
    
    var symbols = ['🌟', '⭐', '🌙', '☀️', '🔴', '🔵'];
    var left = symbols.slice();
    var right = symbols.slice();
    var diffIdx = Math.floor(Math.random() * 6);
    right[diffIdx] = ['🟢', '🟡', '⬜', '⬛'][Math.floor(Math.random() * 4)];
    
    board.innerHTML = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px;background:#f5f5f5;border-radius:12px;">' + left.map(function(s) { return '<div style="text-align:center;font-size:24px;">' + s + '</div>'; }).join('') + '</div>';
    board.innerHTML += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px;background:#f5f5f5;border-radius:12px;">' + right.map(function(s, i) { return '<div style="text-align:center;font-size:24px;cursor:pointer;" onclick="checkDiff(this,' + i + ',' + diffIdx + ')">' + s + '</div>'; }).join('') + '</div>';
    
    gameScore = 0;
    document.getElementById('game-score').textContent = '0/1';
}

function checkDiff(el, idx, correctIdx) {
    if (idx === correctIdx) {
        gameScore++;
        document.getElementById('game-score').textContent = gameScore + '/1';
        if (gameScore >= 3) gameLevel++;
        setTimeout(function() { startDiff(); }, 500);
    }
}

// 图形推理
function startReason() {
    document.getElementById('game-title').textContent = '🧩 图形推理';
    var board = document.getElementById('game-board');
    board.className = 'game-board size-1';
    board.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:250px;gap:16px;';
    
    var patterns = [
        { seq: ['○', '○○', '○○○'], a: 0, opt: ['○○○○', '○○○', '○○○○○'] },
        { seq: ['△', '△△', '△△△'], a: 1, opt: ['△△', '△△△', '△△△△'] },
        { seq: ['□', '□□', '□□□'], a: 2, opt: ['□□', '□□□', '□□□□'] }
    ];
    var p = patterns[Math.min(gameLevel - 1, 2)];
    
    board.innerHTML = '<div style="display:flex;gap:8px;margin-bottom:12px;">' + p.seq.map(function(s) { return '<div style="padding:8px 12px;background:#f0f7ff;border-radius:8px;font-size:20px;">' + s + '</div>'; }).join('') + '<div style="padding:8px 12px;background:#ddd;border-radius:8px;font-size:20px;">？</div></div>';
    board.innerHTML += '<div style="display:flex;gap:12px;">' + p.opt.map(function(o, i) {
        var colors = ['var(--blue)', 'var(--orange)', '#43E97B'];
        return '<button style="padding:10px 16px;background:' + colors[i] + ';color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;" onclick="checkReason(' + i + ',' + p.a + ')">' + o + '</button>';
    }).join('') + '</div>';
    
    gameScore = 0;
    document.getElementById('game-score').textContent = '0';
}

function checkReason(selected, correct) {
    if (selected === correct) {
        gameScore++;
        document.getElementById('game-score').textContent = gameScore;
        if (gameScore >= 3) gameLevel++;
    }
    setTimeout(function() { startReason(); }, 500);
}

// 结束游戏
function endGame() {
    if (gameTimer) clearInterval(gameTimer);
    var timeSpent = Math.round((Date.now() - gameStartTime) / 1000);
    
    var board = document.getElementById('game-board');
    board.style.cssText = 'display:flex;align-items:center;justify-content:center;min-height:200px;';
    board.innerHTML = '<div style="text-align:center;"><div style="font-size:48px;margin-bottom:12px;">🎉</div><div style="font-size:20px;font-weight:bold;color:var(--blue);">游戏结束！</div><div style="font-size:36px;font-weight:bold;margin:16px 0;">得分：' + gameScore + '</div><div style="font-size:14px;color:#666;">用时：' + timeSpent + '秒 · 到达关卡 ' + gameLevel + '</div></div>';
    
    // 保存成绩
    var data = loadData();
    var u = data.user;
    u.gameScores = u.gameScores || {};
    u.gameScores[gameType] = Math.max(u.gameScores[gameType] || 0, gameScore);
    u.todayStats.minutes = (u.todayStats.minutes || 0) + Math.ceil(timeSpent / 60);
    
    var today = new Date().toISOString().split('T')[0];
    u.studyDays = u.studyDays || {};
    u.studyDays[today] = (u.studyDays[today] || 0) + Math.ceil(timeSpent / 60);
    
    saveData(data);
    updateStats();
}

// ====== 设置页面 ======
function renderSettings() {
    var u = getUser();
    var html = '<div class="card"><div class="card-title">个人信息</div>';
    html += '<div class="item"><div class="item-title">👤 ' + u.name + '</div><div class="item-desc">年级：初一</div></div>';
    html += '</div>';
    
    html += '<div class="card"><div class="card-title">难度设置</div>';
    html += '<p style="font-size:13px;color:#666;margin-bottom:12px;">当前难度：Lv.' + u.difficulty + '</p>';
    for (var i = 1; i <= 5; i++) {
        html += '<button class="btn ' + (i === u.difficulty ? '' : 'btn-secondary') + '" style="margin-bottom:8px;" onclick="setDifficulty(' + i + ')">Lv.' + i + ' ' + ['入门', '基础', '进阶', '挑战', '大师'][i - 1] + '</button>';
    }
    html += '</div>';
    
    html += '<div class="card"><div class="card-title">数据管理</div>';
    html += '<button class="btn btn-secondary" onclick="showWrongNotes()">查看错题本</button>';
    html += '<button class="btn btn-secondary" onclick="resetProgress()">重置进度</button>';
    html += '</div>';
    
    return html;
}

function setDifficulty(level) {
    var data = loadData();
    data.user.difficulty = level;
    saveData(data);
    showToast('难度已设置为 Lv.' + level);
    var c = document.getElementById('content-settings');
    if (c) render('settings', c);
}

function showWrongNotes() {
    var u = getUser();
    var notes = u.wrongNotes || [];
    
    var content = '<div class="modal-title">📝 错题本</div>';
    
    if (notes.length === 0) {
        content += '<div style="text-align:center;padding:40px;color:#999;">暂无错题记录<br><span style="font-size:12px;">继续保持，加油！</span></div>';
    } else {
        content += '<div style="max-height:300px;overflow-y:auto;">';
        notes.forEach(function(n) {
            content += '<div style="background:#f5f7ff;padding:12px;border-radius:8px;margin-bottom:8px;">';
            content += '<div style="font-size:14px;margin-bottom:4px;">' + n.question + '</div>';
            content += '<div style="font-size:12px;color:var(--blue);">答案：' + n.answer + '</div></div>';
        });
        content += '</div>';
    }
    content += '<button class="btn btn-secondary" style="margin-top:16px;" onclick="closeModal()">关闭</button>';
    
    openModal(content);
}

function resetProgress() {
    if (!confirm('确定要重置所有学习进度吗？')) return;
    
    var data = loadData();
    data.user.gameScores = {};
    data.user.studyDays = {};
    data.user.planTasks = {};
    data.user.wrongNotes = [];
    data.user.practiceRecords = [];
    data.user.todayStats = { questions: 0, correct: 0, minutes: 0 };
    data.user.aiChatCount = 0;
    data.user.abilities = { attention: 65, memory: 60, logic: 70, creativity: 55, problem: 65, strategy: 60 };
    data.user.knowledge = { math: 30, chinese: 30, english: 30, physics: 30, chemistry: 30 };
    saveData(data);
    
    updateStats();
    showToast('进度已重置');
    closePage();
}

function clearData() {
    if (confirm('确定清除所有数据？')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
    }
}

// ====== 初始化 ======
document.addEventListener('DOMContentLoaded', function() {
    updateStats();
});
</script>
</body>
