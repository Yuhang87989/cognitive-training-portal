<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES6 UI模块测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        h1 { color: white; text-align: center; margin-bottom: 20px; }
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .module-card {
            background: white;
            padding: 30px 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .module-card:hover { transform: translateY(-5px); }
        .module-icon { font-size: 40px; margin-bottom: 10px; }
        .module-name { font-weight: bold; color: #333; }
        #result {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <h1>🧪 ES6 UI模块测试</h1>
    <div id="result"></div>
    <div id="app-container" class="modules-grid"></div>

    <script type="module">
        const result = document.getElementById('result');
        const container = document.getElementById('app-container');
        
        try {
            console.log('开始导入UI模块...');
            import { renderHomePage } from './src/modules/ui-simple.js?t=' + Date.now();
            
            console.log('✅ UI模块导入成功!');
            result.innerHTML = '<p class="success">✅ UI模块导入成功!</p>';
            
            // 渲染首页
            renderHomePage(container);
            result.innerHTML += '<p class="success">✅ 首页渲染成功!</p>';
            
        } catch (error) {
            console.error('❌ 导入失败:', error);
            result.innerHTML = `<p class="error">❌ 失败: ${error.message}</p>`;
        }
    </script>
</body>
</html>
