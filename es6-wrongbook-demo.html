<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES6 Modules - 错题本 Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .demo-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .demo-header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .demo-header h1 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        .demo-header p {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .module-page {
            padding: 0;
        }
        
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            background: #f8f9fa;
        }
        
        .page-header h2 {
            font-size: 18px;
            color: #333;
            flex: 1;
            text-align: center;
            margin-right: 40px;
        }
        
        .back-btn {
            padding: 8px 16px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .add-btn {
            padding: 8px 16px;
            background: #43E97B;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        
        .wrongbook-container {
            padding: 16px;
        }
        
        .filter-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        
        .filter-section select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .count-badge {
            padding: 6px 12px;
            background: #fff3f3;
            color: #ff6b6b;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .question-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #eee;
        }
        
        .question-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .subject-tag {
            padding: 4px 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .mastery-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .mastery-new { background: #fff3f3; color: #ff6b6b; }
        .mastery-learning { background: #fff8e6; color: #f39c12; }
        .mastery-good { background: #e8f5e9; color: #27ae60; }
        .mastery-excellent { background: #e3f2fd; color: #2196f3; }
        
        .card-actions {
            margin-left: auto;
            display: flex;
            gap: 4px;
        }
        
        .action-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .action-btn.edit { background: #e3f2fd; }
        .action-btn.delete { background: #ffebee; }
        
        .question-content {
            margin-bottom: 12px;
        }
        
        .question-text {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }
        
        .question-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 8px;
        }
        
        .question-answer {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .answer-label {
            font-size: 12px;
            color: #27ae60;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .answer-text {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }
        
        .question-note {
            background: #fff8e6;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .note-label {
            font-size: 12px;
            color: #f39c12;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .note-text {
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }
        
        .question-footer {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
        
        .review-info, .date-info {
            font-size: 12px;
            color: #999;
        }
        
        .review-btn {
            margin-left: auto;
            padding: 6px 12px;
            background: linear-gradient(135deg, #43E97B, #38F9D7);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .empty-state p {
            margin-bottom: 8px;
        }
        
        .empty-desc {
            font-size: 13px;
            color: #bbb;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .login-btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 12px;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translate(-50%, -20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        
        @keyframes slideOut {
            from { opacity: 1; transform: translate(-50%, 0); }
            to { opacity: 0; transform: translate(-50%, -20px); }
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <div class="demo-header">
            <h1>📕 ES6 Modules Demo - 错题本</h1>
            <p>测试 ES6 模块化架构下的错题本功能</p>
        </div>
        <div id="app-container"></div>
    </div>
    
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div id="detail-content"></div>
        </div>
    </div>

    <script type="module">
        // 导入所有模块
        import './src/config.js';
        import './src/utils.js';
        import './src/storage.js';
        import './src/db.js';
        import './src/user.js';
        import './src/modules/wrongbook.js';
        import { initUI } from './src/modules/ui.js';
        
        // 初始化应用
        window.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 ES6 Modules Demo 启动...');
            initUI();
        });
    </script>
</body>
</html>
