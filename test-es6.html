<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES6 测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; border-radius: 16px; margin: 10px 0; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ES6 Module 测试</h1>
    <div id="app-container"></div>

    <script type="module">
        console.log('✅ ES6 Module 开始执行');
        
        // 测试基本导入
        import { showToast } from './src/utils.js';
        console.log('✅ 成功导入 showToast');
        
        // 测试渲染
        import { renderHomePage } from './src/modules/ui.js';
        console.log('✅ 成功导入 renderHomePage');
        
        // 先挂载全局函数
        window.showToast = showToast;
        
        // 渲染首页
        const container = document.getElementById('app-container');
        renderHomePage(container);
        console.log('✅ 渲染完成');
    </script>
</body>
</html>
